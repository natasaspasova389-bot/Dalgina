@keyframes bgZoom{from{transform:scale(1);}to{transform:scale(1.07);}}
.vignette{position:fixed;inset:0;z-index:1;background:radial-gradient(ellipse 90% 80% at 50% 50%,transparent 20%,rgba(8,7,5,0.65) 70%),linear-gradient(to bottom,rgba(8,7,5,0.5) 0%,transparent 25%,transparent 70%,rgba(8,7,5,0.8) 100%);}
.line-top{position:fixed;top:0;left:0;right:0;height:3px;background:linear-gradient(to right,transparent,#c9a84c,transparent);z-index:10;}
.line-bottom{position:fixed;bottom:0;left:0;right:0;height:3px;background:linear-gradient(to right,transparent,#c9a84c,transparent);z-index:10;}
.bracket{position:fixed;z-index:10;width:32px;height:32px;}
.bracket.tl{top:18px;left:18px;border-top:1px solid #3a2c10;border-left:1px solid #3a2c10;}
.bracket.tr{top:18px;right:18px;border-top:1px solid #3a2c10;border-right:1px solid #3a2c10;}
.bracket.bl{bottom:18px;left:18px;border-bottom:1px solid #3a2c10;border-left:1px solid #3a2c10;}
.bracket.br{bottom:18px;right:18px;border-bottom:1px solid #3a2c10;border-right:1px solid #3a2c10;}
.content{position:fixed;inset:0;z-index:5;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px 24px;}
.logo{margin-bottom:40px;opacity:0;animation:fadeDown 1s 0.3s ease forwards;}
.logo img{height:68px;}
.particle-line{width:1px;height:64px;background:linear-gradient(to bottom,transparent,#c9a84c,transparent);margin:0 auto 40px;opacity:0;animation:fadeIn 1s 0.6s ease forwards;}
.coming{font-size:10px;letter-spacing:10px;color:#8a6830;text-transform:uppercase;margin-bottom:24px;opacity:0;animation:fadeUp 1s 0.8s ease forwards;}
.main-title{font-family:'Cormorant Garamond',serif;font-size:clamp(52px,9vw,116px);font-weight:300;color:#f0ebe0;line-height:0.9;letter-spacing:-2px;margin-bottom:6px;opacity:0;animation:fadeUp 1.1s 1s ease forwards;}
.main-title em{display:block;color:#c9a84c;font-style:italic;font-size:0.82em;}
.tagline{font-size:10px;letter-spacing:5px;color:#c8bfa8;text-transform:uppercase;margin:28px auto;line-height:2.2;max-width:460px;opacity:0;animation:fadeUp 1s 1.3s ease forwards;}
.sep{display:flex;align-items:center;gap:18px;margin:0 auto 28px;opacity:0;animation:fadeIn 1s 1.5s ease forwards;}
.sep-line{width:52px;height:1px;background:#3a2c10;}
.sep-dot{width:4px;height:4px;border-radius:50%;background:#8a6830;}
.message{font-family:'Cormorant Garamond',serif;font-size:clamp(17px,2.2vw,24px);font-style:italic;color:#c8bfa8;line-height:1.7;max-width:520px;margin-bottom:44px;opacity:0;animation:fadeUp 1s 1.6s ease forwards;}

/* FORM */
.notify-box{display:flex;gap:0;max-width:400px;width:100%;opacity:0;animation:fadeUp 1s 1.9s ease forwards;margin-bottom:16px;}
.notify-input{flex:1;background:rgba(201,168,76,0.06);border:1px solid rgba(201,168,76,0.2);border-right:none;padding:13px 18px;font-family:'Montserrat',sans-serif;font-size:11px;color:#f0ebe0;outline:none;transition:border-color 0.3s;letter-spacing:1px;-webkit-appearance:none;border-radius:0;}
.notify-input::placeholder{color:#3a3028;font-size:10px;letter-spacing:2px;}
.notify-input:focus{border-color:rgba(201,168,76,0.4);background:rgba(201,168,76,0.08);}
.notify-btn{padding:13px 22px;background:#c9a84c;border:none;color:#080705;font-family:'Montserrat',sans-serif;font-size:8px;letter-spacing:3px;text-transform:uppercase;font-weight:500;cursor:pointer;transition:all 0.3s;white-space:nowrap;-webkit-appearance:none;border-radius:0;}
.notify-btn:hover{background:#e8c96a;}
.notify-btn:active{background:#b89040;}

.notify-hint{font-size:9px;letter-spacing:2px;color:#3a3028;opacity:0;animation:fadeIn 1s 2.1s ease forwards;}
.success{display:none;font-family:'Cormorant Garamond',serif;font-size:18px;font-style:italic;color:#c9a84c;margin-top:8px;}
.error-msg{display:none;font-size:10px;color:#c97a4c;margin-top:8px;letter-spacing:1px;}

.bottom{position:fixed;bottom:22px;left:0;right:0;display:flex;justify-content:space-between;padding:0 48px;z-index:10;opacity:0;animation:fadeIn 1.2s 2.3s ease forwards;}
.bottom span{font-size:8px;letter-spacing:3px;color:#3a3028;text-transform:uppercase;}

@keyframes fadeUp{from{opacity:0;transform:translateY(22px);}to{opacity:1;transform:translateY(0);}}
@keyframes fadeDown{from{opacity:0;transform:translateY(-14px);}to{opacity:1;transform:translateY(0);}}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}

@media(max-width:600px){
  html,body{overflow:auto;}
  .content{position:relative;min-height:100vh;padding:80px 22px 100px;}
  .bottom{position:fixed;bottom:14px;padding:0 22px;}
  .bracket{display:none;}
  .notify-box{max-width:100%;}
  .main-title{font-size:clamp(48px,14vw,80px);}
}
</style>
</head>

  <h1 class="main-title">Далгина<em>Метод</em></h1>
  <div class="tagline">Внатрешна архитектура на лидерот — реконструирана</div>
  <div class="sep"><div class="sep-line"></div><div class="sep-dot"></div><div class="sep-line"></div></div>
  <p class="message">Нешто важно е на пат.<br>Четири фази. Еден трансформиран лидер.</p>

  <div class="notify-box">
    <input class="notify-input" type="email" id="emailInput" placeholder="Вашата е-маил адреса">
    <button class="notify-btn" id="notifyBtn" onclick="sendEmail()">Известете ме</button>
  </div>
  <div class="notify-hint" id="hint">Ќе бидете меѓу првите кои ке дознаат.</div>
  <div class="success" id="successMsg">✦ &nbsp; Ви благодариме. Ке ве известиме наскоро.</div>

</div>

<div class="bottom">
  <span>dalgina.mk</span>
  <span>© 2026 Далгина Метод</span>
</div>

<script>
function sendEmail(){
  const input = document.getElementById('emailInput');
  const btn   = document.getElementById('notifyBtn');
  const success = document.getElementById('successMsg');
  const hint  = document.getElementById('hint');
  const error = document.getElementById('errorMsg');
  const box   = document.querySelector('.notify-box');

  const email = input.value.trim();
  if(!email || !email.includes('@') || !email.includes('.')){
    error.style.display='block';
    input.style.borderColor='rgba(201,168,76,0.5)';
    setTimeout(()=>{error.style.display='none';input.style.borderColor='rgba(201,168,76,0.2)';},3000);
    return;
  }

  btn.textContent='...';
  btn.disabled=true;

  // Mailto fallback — opens email client as backup
  const subject = encodeURIComponent('Пријава — Далгина Метод');
  const body = encodeURIComponent('Е-маил за нотификација: ' + email);

  fetch('https://formspree.io/f/mykvbnky', {
    method:'POST',
    headers:{'Content-Type':'application/json','Accept':'application/json'},
    body:JSON.stringify({email:email, _subject:'Нова пријава Далгина Метод'})
  })
  .then(r=>{
    box.style.display='none';
    hint.style.display='none';
    success.style.display='block';
  })
  .catch(()=>{
    // Fallback — mailto
    window.location.href = 'mailto:natashaspasova@yahoo.com?subject='+subject+'&body='+body;
    box.style.display='none';
    hint.style.display='none';
    success.style.display='block';
  });
}

document.getElementById('emailInput').addEventListener('keydown',function(e){
  if(e.key==='Enter') sendEmail();
});
</script>
