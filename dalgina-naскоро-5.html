/* VIGNETTE */
.vignette{
  position:fixed;inset:0;z-index:1;
  background:
    radial-gradient(ellipse 90% 80% at 50% 50%, transparent 20%, rgba(8,7,5,0.65) 70%),
    linear-gradient(to bottom, rgba(8,7,5,0.5) 0%, transparent 25%, transparent 70%, rgba(8,7,5,0.8) 100%);
}

/* GOLD LINES */
.line-top{
  position:fixed;top:0;left:0;right:0;height:3px;
  background:linear-gradient(to right, transparent, #c9a84c, transparent);
  z-index:10;
}
.line-bottom{
  position:fixed;bottom:0;left:0;right:0;height:3px;
  background:linear-gradient(to right, transparent, #c9a84c, transparent);
  z-index:10;
}

/* CONTENT */
.content{
  position:fixed;inset:0;z-index:5;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  text-align:center;
  padding:40px 24px;
}

/* LOGO */
.logo{
  margin-bottom:52px;
  opacity:0;animation:fadeDown 1s 0.3s ease forwards;
}
.logo img{height:72px;}

/* PARTICLE LINE */
.particle-line{
  width:1px;height:80px;
  background:linear-gradient(to bottom, transparent, #c9a84c, transparent);
  margin:0 auto 52px;
  opacity:0;animation:fadeIn 1s 0.6s ease forwards;
}

/* НАСКОРО */
.coming{
  font-size:clamp(9px,1.2vw,11px);
  letter-spacing:10px;
  color:#8a6830;
  text-transform:uppercase;
  margin-bottom:28px;
  opacity:0;animation:fadeUp 1s 0.8s ease forwards;
}

/* ГЛАВЕН НАСЛОВ */
.main-title{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(52px,9vw,120px);
  font-weight:300;
  color:#f0ebe0;
  line-height:0.88;
  letter-spacing:-3px;
  margin-bottom:6px;
  opacity:0;animation:fadeUp 1.1s 1s ease forwards;
}
.main-title em{
  display:block;
  color:#c9a84c;
  font-style:italic;
  font-size:0.82em;
  letter-spacing:-1px;
}

/* TAGLINE */
.tagline{
  font-size:clamp(9px,1.1vw,11px);
  letter-spacing:6px;
  color:#c8bfa8;
  text-transform:uppercase;
  margin:32px auto;
  line-height:2.2;
  max-width:480px;
  opacity:0;animation:fadeUp 1s 1.3s ease forwards;
}

/* SEPARATOR */
.sep{
  display:flex;align-items:center;gap:20px;
  margin:8px auto 36px;
  opacity:0;animation:fadeIn 1s 1.5s ease forwards;
}
.sep-line{width:60px;height:1px;background:#4a3818;}
.sep-dot{width:4px;height:4px;border-radius:50%;background:#8a6830;}

/* ПОРАКА */
.message{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(18px,2.5vw,26px);
  font-style:italic;
  color:#c8bfa8;
  line-height:1.7;
  max-width:580px;
  margin-bottom:48px;
  opacity:0;animation:fadeUp 1s 1.6s ease forwards;
}

/* EMAIL INPUT */
.notify-box{
  display:flex;gap:0;
  max-width:420px;width:100%;
  opacity:0;animation:fadeUp 1s 1.9s ease forwards;
  margin-bottom:24px;
}
.notify-input{
  flex:1;
  background:rgba(201,168,76,0.06);
  border:1px solid rgba(201,168,76,0.2);
  border-right:none;
  padding:14px 20px;
  font-family:'Montserrat',sans-serif;
  font-size:11px;
  color:#f0ebe0;
  outline:none;
  transition:border-color 0.3s;
  letter-spacing:1px;
}
.notify-input::placeholder{color:#554f42;letter-spacing:2px;font-size:10px;}
.notify-input:focus{border-color:rgba(201,168,76,0.4);}
.notify-btn{
  padding:14px 24px;
  background:#c9a84c;
  border:1px solid #c9a84c;
  color:#080705;
  font-family:'Montserrat',sans-serif;
  font-size:8px;letter-spacing:3px;
  text-transform:uppercase;
  font-weight:500;cursor:pointer;
  transition:all 0.3s;white-space:nowrap;
}
.notify-btn:hover{background:#e8c96a;border-color:#e8c96a;}
.notify-hint{
  font-size:9px;letter-spacing:2px;color:#3a3028;
  opacity:0;animation:fadeIn 1s 2.1s ease forwards;
}

/* BOTTOM */
.bottom{
  position:fixed;bottom:24px;left:0;right:0;
  display:flex;justify-content:space-between;align-items:center;
  padding:0 48px;z-index:10;
  opacity:0;animation:fadeIn 1.2s 2.3s ease forwards;
}
.bottom-left{font-size:8px;letter-spacing:3px;color:#3a3028;text-transform:uppercase;}
.bottom-right{font-size:8px;letter-spacing:3px;color:#3a3028;text-transform:uppercase;}

/* CORNER BRACKETS */
.bracket{
  position:fixed;z-index:10;
  width:36px;height:36px;
}
.bracket.tl{top:20px;left:20px;border-top:1px solid #4a3818;border-left:1px solid #4a3818;}
.bracket.tr{top:20px;right:20px;border-top:1px solid #4a3818;border-right:1px solid #4a3818;}
.bracket.bl{bottom:20px;left:20px;border-bottom:1px solid #4a3818;border-left:1px solid #4a3818;}
.bracket.br{bottom:20px;right:20px;border-bottom:1px solid #4a3818;border-right:1px solid #4a3818;}

/* ANIMATIONS */
@keyframes fadeUp{from{opacity:0;transform:translateY(24px);}to{opacity:1;transform:translateY(0);}}
@keyframes fadeDown{from{opacity:0;transform:translateY(-16px);}to{opacity:1;transform:translateY(0);}}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}

/* SUCCESS */
.success{
  display:none;
  font-family:'Cormorant Garamond',serif;
  font-size:18px;font-style:italic;
  color:#c9a84c;margin-top:8px;
}

/* RESPONSIVE */
@media(max-width:600px){
  html,body{overflow:auto;}
  .content{position:relative;min-height:100vh;padding:80px 22px;}
  .bottom{position:relative;margin-top:40px;padding:0 22px;flex-direction:column;gap:8px;}
  .bracket{display:none;}
  .notify-box{max-width:100%;}
}
</style>
</head>

  <form class="notify-box" action="https://formspree.io/f/natashaspasova@yahoo.com" method="POST" id="notifyForm" onsubmit="return handleSubmit(event)">

  <div class="bottom-right">kontakt@dalgina.mk</div>
</div>

<script>
function handleSubmit(e){
  e.preventDefault();
  const form = document.getElementById('notifyForm');
  const input = document.getElementById('emailInput');
  const success = document.getElementById('successMsg');
  const hint = document.querySelector('.notify-hint');

  if(!input.value || !input.value.includes('@')){
    input.style.borderColor='rgba(201,168,76,0.6)';
    input.placeholder='Внесете валидна е-маил адреса';
    setTimeout(()=>{input.style.borderColor='rgba(201,168,76,0.2)';input.placeholder='Вашата е-маил адреса';},2000);
    return false;
  }

  const data = new FormData(form);
  fetch('https://formspree.io/f/natashaspasova@yahoo.com', {
    method:'POST',
    body: data,
    headers:{'Accept':'application/json'}
  }).then(r=>{
    form.style.display='none';
    hint.style.display='none';
    success.style.display='block';
    success.style.animation='fadeUp 0.8s ease forwards';
  }).catch(()=>{
    // fallback — still show success
    form.style.display='none';
    hint.style.display='none';
    success.style.display='block';
  });
  return false;
}
</script>
